name: Periphery
on:
  push:
    branches: [main]
  pull_request:
jobs:
  periphery:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"
      - name: Install Periphery
        run: brew install periphery
      - name: Run Periphery
        run: periphery scan --strict
